<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Pablo Vilela — Revisar anamnese</title>
  <script>document.documentElement.classList.add('js-loaded');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="db.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mono" aria-hidden="true">PV</div>
        <div class="brand-text">Dr. Pablo Vilela<small>Mentor de Saúde</small></div>
      </div>
      <nav class="nav-group" aria-label="Área do Dr. Pablo">
        <div class="nav-group-label">Dr. Pablo</div>
        <a class="nav-link" href="index.html"><i class="ph ph-squares-four"></i>Dashboard</a>
        <a class="nav-link" href="revisar-anamnese.html" aria-current="page"><i class="ph ph-clipboard-text"></i>Revisar anamnese</a>
        <a class="nav-link" href="montar-protocolo.html?p=maria"><i class="ph ph-list-checks"></i>Montar protocolo</a>
        <a class="nav-link" href="progressao.html"><i class="ph ph-chart-line"></i>Progressão</a>
      </nav>
      <nav class="nav-group nav-group--patient" aria-label="App do paciente">
        <div class="nav-group-label">App do paciente (PWA)</div>
        <a class="nav-link" href="app.html?view=anamnese"><i class="ph ph-path"></i>Anamnese</a>
        <a class="nav-link" href="app.html?view=hoje"><i class="ph ph-sun-horizon"></i>Hoje</a>
        <a class="nav-link" href="app.html?view=treino"><i class="ph ph-barbell"></i>Treino</a>
        <a class="nav-link" href="app.html?view=plano"><i class="ph ph-notebook"></i>Plano</a>
        <a class="nav-link" href="app.html?view=progresso"><i class="ph ph-chart-line-up"></i>Progresso</a>
      </nav>
    </aside>

    <div class="shell-main">
      <header class="topbar">
        <div class="topbar-title">Dr. Pablo Vilela <small>· Mentor de Saúde e Alta Performance</small></div>
        <div class="topbar-spacer"></div>
        <button class="chip-soon" disabled aria-disabled="true" title="Disponível em breve"><i class="ph ph-watch"></i>Conectar Garmin · Em breve</button>
        <div class="avatar-wrap">
          <button class="avatar-btn" id="avatarBtn" aria-haspopup="true" aria-expanded="false" aria-label="Menu da conta">PV</button>
          <div class="avatar-menu" id="avatarMenu" role="menu" aria-label="Conta">
            <div class="avatar-menu-head"><strong>Dr. Pablo Vilela</strong><span>pablo@vilela.health</span></div>
            <button role="menuitem"><i class="ph ph-user-gear"></i>Minha conta</button>
            <button role="menuitem"><i class="ph ph-bell"></i>Notificações</button>
            <button role="menuitem"><i class="ph ph-sign-out"></i>Sair</button>
          </div>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <div class="toast-host" id="toastHost" aria-live="polite"></div>

  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function toast(msg, icon){var host=document.getElementById('toastHost');var t=document.createElement('div');t.className='toast';t.innerHTML='<i class="ph '+(icon||'ph-check-circle')+'"></i>'+esc(msg);host.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 240ms';setTimeout(function(){t.remove();},240);},2400);}
    (function(){var btn=document.getElementById('avatarBtn');var menu=document.getElementById('avatarMenu');function close(){menu.dataset.open='false';btn.setAttribute('aria-expanded','false');}btn.addEventListener('click',function(e){e.stopPropagation();var open=menu.dataset.open==='true';menu.dataset.open=open?'false':'true';btn.setAttribute('aria-expanded',String(!open));});document.addEventListener('click',function(e){if(!menu.contains(e.target))close();});document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});})();

    var ETAPAS = [
      { k:'e1', t:'Dados pessoais', labels:{nome:'Nome',idadeSexo:'Idade · Sexo',alturaPeso:'Altura · Peso',objetivo:'Objetivo',dexa:'DEXA'} },
      { k:'e2', t:'Saúde intestinal', labels:{diag:'Diagnóstico',lactose:'Lactose',gluten:'Glúten',fezes:'Fezes',gases:'Gases',distensao:'Distensão',desconforto:'Desconforto'} },
      { k:'e3', t:'Mental & sono', labels:{estresse:'Estresse',humor:'Humor',sono:'Sono',tela:'Tela à noite',indutor:'Indutor de sono',cafeNoite:'Café à noite'} },
      { k:'e4', t:'Hidratação & hábitos', labels:{agua:'Água',bebidas:'Bebidas',refeicoes:'Refeições/dia',doce:'Doce',ultra:'Ultraprocessados',frituras:'Frituras'} },
      { k:'e5', t:'Preferências alimentares', labels:{proteinas:'Proteínas',carbo:'Carboidratos',frutas:'Frutas',vegetais:'Vegetais',evita:'Evita',pioraIntestino:'Piora intestino'} },
      { k:'e6', t:'Atividade física', labels:{pratica:'Pratica',freq:'Frequência',aerobico:'Aeróbico',lesao:'Lesão',medicamentos:'Medicamentos',suplementos:'Suplementos'} },
      { k:'e7', t:'Saúde & expectativas', labels:{doenca:'Doença',familiar:'Histórico familiar',cirurgia:'Cirurgia abdominal',incomodo:'Incômodo',acompanhamento:'Acompanhamento',preparo:'Tempo de preparo'} }
    ];

    function render(){
      var PID = new URLSearchParams(location.search).get('p') || 'joao';
      var pat = PVDB.patient(PID); var ana = PVDB.anamnese(PID);
      var c = document.getElementById('content');
      if(!pat){ c.innerHTML='<a class="breadcrumb" href="index.html"><i class="ph ph-arrow-left"></i>Dashboard</a><div class="empty" style="margin-top:3rem"><i class="ph-duotone ph-user-circle"></i><strong>Paciente não encontrado</strong></div>'; return; }

      var head = '<a class="breadcrumb" href="index.html"><i class="ph ph-arrow-left"></i>Dashboard</a>'
        + '<div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap"><div>'
        + '<p class="eyebrow">Triagem'+(ana&&ana.submittedRel?' · Anamnese concluída '+esc(ana.submittedRel):'')+'</p>'
        + '<h1>'+esc(pat.nome)+' <span style="font-family:var(--font-body);font-weight:400;font-size:1rem;color:var(--color-text-muted)">· '+esc(pat.idade||'—')+' anos · '+esc(pat.objetivo)+'</span></h1></div>'
        + '<div style="display:flex;gap:0.5rem"><button class="btn btn-ghost" id="consultBtn"><i class="ph ph-video-camera"></i>Agendar consulta</button>'
        + '<a class="btn btn-accent" href="montar-protocolo.html?p='+esc(PID)+'"><i class="ph ph-list-checks"></i>Montar protocolo</a></div></div>';

      if(!ana || !ana.e1){
        c.innerHTML = head + '<div class="empty" style="margin-top:2rem"><i class="ph-duotone ph-hourglass-medium"></i><strong>Anamnese ainda não preenchida</strong><span>'+esc(pat.nome)+' recebeu o link mas ainda não respondeu.</span></div>';
        wireConsult(PID); return;
      }

      var consult = PVDB.consult(PID);
      var consultBanner = consult ? '<div class="p-card" style="margin-bottom:1.25rem;display:flex;align-items:center;gap:0.75rem;padding:0.875rem 1rem"><i class="ph-duotone ph-video-camera" style="font-size:1.5rem;color:var(--color-action-primary)"></i><div style="flex:1"><strong style="font-family:var(--font-display)">Consulta agendada</strong><div style="font-size:0.8125rem;color:var(--color-text-secondary)">'+esc(consult.quando)+'</div></div><span class="chip chip-success"><i class="ph ph-check"></i>Marcada</span></div>' : '';

      var resumo = ana.resumo ? '<div class="summary-cards">'
        + card('ph-target','Objetivo',ana.resumo.objetivo)
        + card('ph-heartbeat','Saúde',ana.resumo.saude)
        + card('ph-intersect','Intestino',ana.resumo.intestino)
        + card('ph-person-simple-run','Atividade',ana.resumo.atividade) + '</div>'
        : '<div class="summary-card"><div class="val">Resumo automático indisponível para este paciente.</div></div>';

      var flags = (ana.flags||[]);
      var nDanger = flags.filter(function(f){return f.sev==='danger';}).length;
      var nWarn = flags.filter(function(f){return f.sev==='warning';}).length;
      var flagsHtml = flags.length ? flags.map(function(f){
        return '<div class="flag-row '+esc(f.sev)+'"><i class="ph-duotone '+(f.sev==='danger'?'ph-warning-octagon':'ph-warning')+' ic"></i><div class="ft"><strong>'+esc(f.titulo)+'</strong><span>'+esc(f.det)+'</span></div><span class="chip chip-'+esc(f.sev)+' flag-sev"><i class="ph '+esc(f.icon||'ph-flag')+'"></i>'+esc(f.tag)+'</span></div>';
      }).join('') : '<div class="flag-row"><div class="ft"><span>Nenhuma flag de risco.</span></div></div>';

      var acc = ETAPAS.map(function(e,i){
        var data = ana[e.k]; if(!data) return '';
        var kv = Object.keys(e.labels).map(function(key){ if(data[key]==null) return ''; return '<div class="kv"><dt>'+esc(e.labels[key])+'</dt><dd>'+esc(data[key])+'</dd></div>'; }).join('');
        return '<div class="acc-item" data-open="'+(i===0?'true':'false')+'"><button class="acc-head" aria-expanded="'+(i===0?'true':'false')+'"><span class="acc-step">'+(i+1)+'</span><span class="at">'+esc(e.t)+'</span><i class="ph ph-caret-down chev"></i></button><div class="acc-panel"><dl>'+kv+'</dl></div></div>';
      }).join('');

      c.innerHTML = head + consultBanner
        + '<div class="triage-grid"><section><div class="section-title"><i class="ph ph-sparkle"></i><h2>Resumo automático</h2></div>'+resumo+'</section>'
        + '<section class="flags-panel"><div class="section-title"><i class="ph-duotone ph-flag" style="color:var(--color-semantic-danger)"></i><h2>Flags de risco</h2>'+(flags.length?'<span class="chip chip-danger" style="margin-left:auto"><i class="ph ph-warning-octagon"></i>'+nDanger+' clínicas · '+nWarn+' estilo de vida</span>':'')+'</div>'+flagsHtml+'</section></div>'
        + '<section><div class="section-title" style="margin-top:0.5rem"><i class="ph ph-list-bullets"></i><h2>Respostas por etapa</h2><span class="pc-goal" style="margin-left:auto">modo leitura</span></div><div class="accordion">'+acc+'</div></section>';

      document.querySelectorAll('.acc-head').forEach(function(h){h.addEventListener('click',function(){var it=h.closest('.acc-item');var o=it.dataset.open==='true';it.dataset.open=o?'false':'true';h.setAttribute('aria-expanded',String(!o));});});
      wireConsult(PID);
    }
    function card(ic,lbl,val){ return '<div class="summary-card"><div class="lbl"><i class="ph '+ic+'"></i>'+esc(lbl)+'</div><div class="val">'+esc(val||'—')+'</div></div>'; }
    function wireConsult(PID){
      var b=document.getElementById('consultBtn'); if(!b) return;
      b.addEventListener('click',function(){ PVDB.scheduleConsult(PID,'Amanhã, 14:00 · Google Meet'); toast('Consulta agendada — o paciente verá no app','ph-video-camera'); render(); });
    }
    render();
  </script>
</body>
</html>
